<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        /* Tüm sayfayı kaplayıp içeriği tam ortaya hizalar */

            margin: 0;
            padding: 0;

            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* Bembeyaz sayfa */
        }

        /* Yazının stili */
        h1 {
            font-family: 'Arial Black', Impact, sans-serif; /* Dolu dolu ve kalın font */

            font-weight: 900; /* En kalın ağırlık */
            color: #111111; /* Simsiyah yerine çok koyu bir antrasit, ekranda daha şık durur */
            margin: 0;
            letter-spacing: -2px; /* Harfleri hafifçe birbirine yaklaştırıp daha tok bir görüntü verir */
        }

        /* Telefon ekranlarında çok küçülmesini engellemek için */
        @media (max-width: 600px) {
            h1 {
                font-size: 4rem;
            }
        }
    </style>
